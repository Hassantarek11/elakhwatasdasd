name: eduapp
description: منصة تعليمية متكاملة
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6
  firebase_storage: ^11.5.6

  # UI & Navigation
  go_router: ^12.1.3
  provider: ^6.1.1
  google_fonts: ^6.1.0

  # Video
  youtube_player_flutter: ^8.1.2
  cached_network_image: ^3.3.0

  # Utils
  shared_preferences: ^2.2.2
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3
  lottie: ^2.7.0
  fluttertoast: ^8.2.4
  image_picker: ^1.0.7
  uuid: ^4.2.2
  timeago: ^3.6.0
  flutter_staggered_animations: ^1.1.1
  iconsax: ^0.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
